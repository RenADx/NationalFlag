<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Flag Trainer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        .container {
            max-width: 500px;
            margin: 20px auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #ffcc00; margin-top: 0; font-size: 1.8rem;}
        #stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
        }
        #timer { color: #ff4d4d; }
        #score { color: #4da6ff; }
        .flag-box {
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2d2d2d;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #3d3d3d;
            overflow: hidden;
        }
        /* Style for the flag images to make them display clearly at a uniform size */
        #flag-img {
            max-width: 80%;
            max-height: 75%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        #flag-placeholder {
            font-size: 100px;
            line-height: 1;
        }
        .btn {
            font-size: 1.6rem;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
        }
        #start-btn { background-color: #00cc66; color: white; }
        #stop-btn { background-color: #ff3333; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>FLAG RECORD TRAINER ⚡</h1>
    
    <div id="stats">
        <div>⏱️ <span id="timer">02:00</span></div>
        <div>🚩 <span id="score">0/195</span></div>
    </div>

    <div class="flag-box">
        <div id="flag-display">
            <span id="flag-placeholder">🏁</span>
        </div>
    </div>

    <button id="start-btn" class="btn" onclick="startGame()">START AUTO RUN</button>
    <button id="stop-btn" class="btn hidden" onclick="endGame(false)">STOP RUN</button>
</div>

<script>
const allCountryCodes = [
    "AF", "AL", "DZ", "AD", "AO", "AG", "AR", "AM", "AU", "AT", "AZ", "BS", "BH", "BD", "BB", "BY", "BE", "BZ", "BJ", "BT",
    "BO", "BA", "BW", "BR", "BN", "BG", "BF", "BI", "CV", "KH", "CM", "CA", "CF", "TD", "CL", "CN", "CO", "KM", "CG", "CD",
    "CR", "CI", "HR", "CU", "CY", "CZ", "DK", "DJ", "DM", "DO", "EC", "EG", "SV", "GQ", "ER", "EE", "SZ", "ET", "FJ", "FI",
    "FR", "GA", "GM", "GE", "DE", "GH", "GR", "GD", "GT", "GN", "GW", "GY", "HT", "HN", "HU", "IS", "IN", "ID", "IR", "IQ",
    "IE", "IL", "IT", "JM", "JP", "JO", "KZ", "KE", "KI", "KP", "KR", "KW", "KG", "LA", "LV", "LB", "LS", "LR", "LY", "LI",
    "LT", "LU", "MG", "MW", "MY", "MV", "ML", "MT", "MH", "MR", "MU", "MX", "FM", "MD", "MC", "MN", "ME", "MA", "MZ", "MM",
    "NA", "NR", "NP", "NL", "NZ", "NI", "NE", "NG", "MK", "NO", "OM", "PK", "PW", "PS", "PA", "PG", "PY", "PE", "PH", "PL",
    "PT", "QA", "RO", "RU", "RW", "KN", "LC", "VC", "WS", "SM", "ST", "SA", "SN", "RS", "SC", "SL", "SG", "SK", "SI", "SB",
    "SO", "ZA", "SS", "ES", "LK", "SD", "SR", "SE", "CH", "SY", "TW", "TJ", "TZ", "TH", "TL", "TG", "TO", "TT", "TN", "TR",
    "TM", "TV", "UG", "UA", "AE", "GB", "US", "UY", "UZ", "VU", "VA", "VE", "VN", "YE", "ZM", "ZW"
 */

let remainingFlags = [];
let score = 0;
let clockInterval;
let flagInterval;
let timeLeft = 120;
const autoSpeed = 615; 

function startGame() {
    remainingFlags = [...allCountryCodes];
    
    // Shuffle
    for (let i = remainingFlags.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remainingFlags[i], remainingFlags[j]] = [remainingFlags[j], remainingFlags[i]];
    }
    
    score = 0;
    timeLeft = 120;
    
    document.getElementById('score').innerText = `0/${allCountryCodes.length}`;
    document.getElementById('timer').innerText = "02:00";
    document.getElementById('start-btn').classList.add('hidden');
    document.getElementById('stop-btn').classList.remove('hidden');
    
    clearInterval(clockInterval);
    clearInterval(flagInterval);
    
    clockInterval = setInterval(updateClock, 1000);
    runAutoFlagCycle();
    flagInterval = setInterval(runAutoFlagCycle, autoSpeed);
}

function updateClock() {
    timeLeft--;
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    document.getElementById('timer').innerText = 
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    if (timeLeft <= 0) {
        endGame(false);
    }
}

function runAutoFlagCycle() {
    if (remainingFlags.length === 0) {
        endGame(true);
        return;
    }
    
    score++;
    document.getElementById('score').innerText = `${score}/${allCountryCodes.length}`;
    
    const currentCode = remainingFlags.pop().toLowerCase();
    
    // Fetches vector flag graphic instead of using the browser's raw text fonts
    document.getElementById('flag-display').innerHTML = 
        `<img id="flag-img" src="https://flagcdn.com/w320/${currentCode}.png" alt="flag">`;
}

function endGame(isWin) {
    clearInterval(clockInterval);
    clearInterval(flagInterval);
    
    document.getElementById('stop-btn').classList.add('hidden');
    document.getElementById('start-btn').classList.remove('hidden');
    document.getElementById('start-btn').innerText = "START AGAIN";
    
    document.getElementById('flag-display').innerHTML = '<span id="flag-placeholder">🏁</span>';
    
    if (isWin) {
        alert("🏆 TIME UP! Run complete at world record pace!");
    } else {
        alert(`Stopped! Completed: ${score - 1}/195`);
    }
}
</script>
</body>
</html>
